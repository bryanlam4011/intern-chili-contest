<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chili Contest Voting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="voting-page">
  <div class="vote-beach-scene" aria-hidden="true">
    <div class="vote-sun"></div>
    <div class="vote-cloud vote-cloud-one"></div>
    <div class="vote-cloud vote-cloud-two"></div>
    <div class="vote-ocean">
      <div class="vote-wave vote-wave-one"></div>
      <div class="vote-wave vote-wave-two"></div>
    </div>
    <div class="vote-shoreline"></div>
  </div>

  <main class="voting-shell">
    <header class="vote-header">
      <p class="vote-kicker">Beachside Chili Ballot</p>
      <h1>Vote for your favorite contestant</h1>
      <p>Pick the bowl bringing the biggest splash of flavor. Live vote totals update as the beach party decides.</p>
    </header>

    <section id="vote-grid" class="vote-grid" aria-live="polite"></section>
    <div id="vote-status" class="vote-status"></div>

    <div class="vote-actions">
      <button id="submit-vote" class="blob-btn" disabled>Submit Vote</button>
    </div>
  </main>

  <a class="back-btn" href="index.html">Back Home</a>

  <script type="module" src="vote.js"></script>
</body>
</html>

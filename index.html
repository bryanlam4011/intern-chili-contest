
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chili Contest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aclonica&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</head>
<body class="home-page">
  <div class="home-scene" aria-hidden="true">
    <div class="lux-sun"></div>
    <div class="lux-cloud cloud-a"></div>
    <div class="lux-cloud cloud-b"></div>
    <div class="lux-sea">
      <div class="lux-wave wave-a"></div>
      <div class="lux-wave wave-b"></div>
      <div class="lux-shimmer"></div>
    </div>
    <div class="lux-sand"></div>
  </div>
   <div class="wave-container" aria-label="Chili Contest">
      <h1 class="wave-text">
        <span>C</span><span>h</span><span>i</span><span>l</span><span>i</span>
        <span class="wave-space" aria-hidden="true">&nbsp;</span>
        <span>C</span><span>o</span><span>n</span><span>t</span><span>e</span><span>s</span><span>t</span>
      </h1>
    </div>

  <div id="palm-lottie"></div>
  <div id="palm-lottie-left" class="leftPalmTree"></div>

  <main class="home-content">
    <div class="home-vote-action">
      <a href="vote.html" target="_self" class="blob-btn">Vote Now
        <span class="blob-btn__inner">
          <span class="blob-btn__blobs">
            <span class="blob-btn__blob"></span>
            <span class="blob-btn__blob"></span>
            <span class="blob-btn__blob"></span>
            <span class="blob-btn__blob"></span>
          </span>
        </span>
      </a>
    </div>
    <div id="home-post-vote" style="display:none;margin-top:1rem;text-align:center;">
      <a class="blob-btn" href="results.html">View Results</a>
    </div>
  </main>

  <script>
    const sharedConfig = { renderer: 'svg', loop: true, autoplay: true, path: 'Palm Tree Leaf Animation.json' };
    lottie.loadAnimation({ ...sharedConfig, container: document.getElementById('palm-lottie') });
    lottie.loadAnimation({ ...sharedConfig, container: document.getElementById('palm-lottie-left') });
  </script>

  <script>
    (function(){
      try {
        const key = 'internChiliContestVote';
        const hasVoted = !!localStorage.getItem(key);
        if (hasVoted) {
          const el = document.getElementById('home-post-vote');
          if (el) el.style.display = 'block';
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>

</body>
</html>
